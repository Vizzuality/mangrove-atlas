name: Playwright Tests

on:
  pull_request:
    branches: [develop]

jobs:
  test:
    name: Playwright Tests
    timeout-minutes: 30
    runs-on: ubuntu-24.04
    environment: development
    env:
      CI: true
      NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN }}
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_ANALYSIS_API_URL: ${{ secrets.NEXT_PUBLIC_ANALYSIS_API_URL }}
      NEXT_PUBLIC_PLANET_API_KEY: ${{ secrets.NEXT_PUBLIC_PLANET_API_KEY }}
      NEXT_PUBLIC_TRANSIFEX_API_KEY: ${{ secrets.NEXT_PUBLIC_TRANSIFEX_API_KEY }}
      NEXT_PUBLIC_MRTT_SITE: ${{ secrets.NEXT_PUBLIC_MRTT_SITE }}
      NEXT_PUBLIC_AUTH_URL: ${{ secrets.NEXT_PUBLIC_AUTH_URL }}
      AUTH_API_URL: ${{ secrets.AUTH_API_URL }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_SMTP_ADDRESS: ${{ secrets.NEXT_PUBLIC_SMTP_ADDRESS }}
      NEXT_PUBLIC_SMTP_PASSWORD: ${{ secrets.NEXT_PUBLIC_SMTP_PASSWORD }}
      NEXT_PUBLIC_SMTP_PORT: ${{ secrets.NEXT_PUBLIC_SMTP_PORT }}
      NEXT_PUBLIC_SMTP_USER_NAME: ${{ secrets.NEXT_PUBLIC_SMTP_USER_NAME }}
      # Isolated test environment defaults — keep behavior consistent across runs.
      NEXT_PUBLIC_FEATURED_FLAGS: '{}'
      NEXT_PUBLIC_VERCEL_ENV: preview
      NEXT_PUBLIC_ENVIRONMENT: staging
      NEXT_PUBLIC_GA_ID: ''
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium firefox
      - name: Run Playwright tests
        run: pnpm exec playwright test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
